{% extends "base.html" %}
{% block title %}Panel de Control - Root{% endblock %}
{% block content %}

<div class="container-fluid px-2 py-3">
  <h4 class="mb-4 text-center">Dashboard de Superusuario</h4>

  <div class="row justify-content-center mb-4">
    <div class="col-md-6">
      <div class="d-grid gap-3">

        <!-- Botón: Ver Auditoría -->
        <a href="{{ url_for('auditoria.ver_auditoria') }}" class="btn btn-outline-dark btn-lg w-100">
          <i class="bi bi-shield-check"></i> Ver Auditoría del Sistema
        </a>

        <!-- Administración de canastas -->
        <a href="{{ url_for('canastas.admin') }}" class="btn btn-warning btn-lg w-100">
          <i class="bi bi-basket"></i> Administrar Canastas
        </a>

        <!-- Mantenimiento de movimientos -->
        <a href="{{ url_for('movimientos.mantenimiento') }}" class="btn btn-secondary btn-lg w-100">
          <i class="bi bi-tools"></i> Depurar Movimientos
        </a>

      </div>
    </div>
  </div>
</div>

{% endblock %}
